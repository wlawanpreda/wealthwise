<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Wealthwise">
  <!-- Background tile — rounded square in brand blue gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle blueprint grid -->
  <g stroke="white" stroke-opacity="0.08" stroke-width="1">
    <path d="M0 128 H512 M0 256 H512 M0 384 H512 M128 0 V512 M256 0 V512 M384 0 V512"/>
  </g>

  <!-- Upward trend line — represents wealth growth -->
  <polyline
    points="80,360 160,300 240,320 320,220 400,180 432,160"
    fill="none"
    stroke="#10b981"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Final upward arrow head -->
  <path
    d="M412 142 L432 160 L420 184"
    fill="none"
    stroke="#10b981"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Coin — anchors the financial theme -->
  <circle cx="160" cy="300" r="34" fill="#fbbf24" stroke="white" stroke-width="6"/>
  <text x="160" y="316" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="900" font-size="42" fill="white">฿</text>
</svg>
